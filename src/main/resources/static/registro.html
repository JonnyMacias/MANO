<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="estilos/estiloReg.css">
</head>
<body>
    <form class="registrarU">
        <h1>Crear mi Cuenta</h1><br>
        <div class="registrarU__form">
            <div class="cargarIMg">
                <div>
                    <div id="imagePreview" class="image-preview">
                    </div>
                    <p>Cargar imagen del usuario, Esto servira para poder desbloquear la mano</p>
                </div>
                
                
                <input type="file" id="imageUpload" accept="image/*">
            </div>
            <br>
            <label for="">Nombre Completo:</label><br>
            <input type="text" id="nombre"><br><br>
            <label for="">Correo Electronico:</label><br>
            <input type="text" id="correo"><br><br>
            <label for="">Contraseña:</label><br>
            <input type="password" id="contraseña"><br><br>
            <label for="">Confirmar Contraseña:</label><br>
            <input type="password" id="confContraseña"><br><br>
        </div>
        <a href="#" class="registrar" id="linkLogin" onclick="registrarUsuarios()">REGISTRAR</a>
    </form>
    
</body>
<script src="JS/scripCargarIMG.js"></script>
</html>
